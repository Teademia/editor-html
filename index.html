<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>The Ember Tavern</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"/>
<style>
  :root {
    --bg: #14100a; --ink: #f1e6d2; --ink-dim: #b9a888; --ink-faint: #7a6a50;
    --accent: #f0a26b; --accent-2: #e87c3f; --line: rgba(240,226,198,.14);
    --serif: "Noto Serif SC", Georgia, serif;
    --sans: "Noto Sans SC", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--serif); overflow: hidden; }

  .stage {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 48px;
  }
  .stage::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(240,162,107,.1), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,.5), transparent 60%);
  }
  .stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: overlay;
  }

  .hero { position: relative; text-align: center; }
  .hero .sup {
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
    letter-spacing: .2em; text-transform: uppercase; margin-bottom: 14px;
  }
  .hero h1 {
    font-family: var(--serif); font-size: clamp(28px, 5vw, 48px);
    font-weight: 700; color: var(--ink); letter-spacing: .04em;
    text-shadow: 0 0 40px rgba(240,162,107,.2);
    margin-bottom: 12px;
  }
  .hero .sub {
    font-family: var(--sans); font-size: 14px; color: var(--ink-dim);
    letter-spacing: .02em;
  }

  .cards {
    position: relative; display: flex; gap: 20px;
    flex-wrap: wrap; justify-content: center; padding: 0 24px;
  }
  .card {
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 10px; padding: 28px 32px;
    background: rgba(240,226,198,.03); border: 1px solid var(--line);
    border-radius: 10px; text-decoration: none; color: var(--ink);
    width: 220px; cursor: pointer;
    transition: background .25s, border-color .25s, transform .25s;
  }
  .card:hover { background: rgba(240,162,107,.06); border-color: var(--accent); transform: translateY(-3px); }
  .card .icon { font-size: 28px; line-height: 1; }
  .card .card-title { font-family: var(--serif); font-size: 17px; font-weight: 600; }
  .card .card-desc { font-family: var(--sans); font-size: 12px; color: var(--ink-dim); line-height: 1.6; }
  .card .card-link {
    margin-top: 6px; font-family: var(--mono); font-size: 11px;
    color: var(--accent); letter-spacing: .04em;
  }

  .footer {
    position: relative; font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint); letter-spacing: .06em;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="hero">
    <div class="sup">Visual Novel Toolkit</div>
    <h1>The Ember Tavern</h1>
    <div class="sub">基于 Dialogic .dtl 格式的视觉小说创作工具</div>
  </div>

  <div class="cards">
    <a class="card" href="studio.html">
      <div class="icon">✦</div>
      <div class="card-title">创作工作台</div>
      <div class="card-desc">AI 辅助视觉小说创作，支持四层级结构与骨架生成</div>
      <div class="card-link">studio.html →</div>
    </a>
    <a class="card" href="editor.html">
      <div class="icon">◆</div>
      <div class="card-title">节点编辑器</div>
      <div class="card-desc">可视化创作剧情，拖拽连接场景，编辑对话与选项</div>
      <div class="card-link">editor.html →</div>
    </a>
    <a class="card" href="player.html">
      <div class="icon">▶</div>
      <div class="card-title">剧情播放器</div>
      <div class="card-desc">预览并游玩已创作的剧情，支持变量状态追踪</div>
      <div class="card-link">player.html →</div>
    </a>
  </div>

  <div class="footer">story.dtl · Dialogic 2 兼容格式</div>
</div>
</body>
</html>
